            <svg class="text-blue-100" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"/><path d="M6 18.8V14l6 2.5 6-2.5v4.8a2 2 0 0 1-1.33 1.886l-4.17 1.39a2 2 0 0 1-1.33 0l-4.17-1.39A2 2 0 0 1 6 18.8z"/></svg>
        );
        const ChevronDownIcon = () => (
            <svg class="text-slate-400" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        );
        const SettingsIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        );
        const FileTextIcon = () => (
            <svg class="text-slate-600" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
        );
        const CopyIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
        );
        const CheckCircleIcon = () => (
            <svg class="text-green-500" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
        );
        const DownloadIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
        );
        const BookOpenIcon = () => (
            <svg class="text-blue-600" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        );
        const ArrowDownIcon = () => (
            <svg class="text-blue-400 print:text-black" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>
        );

        // --- MAIN APP COMPONENT ---
        function App() {
          const [selectedFase, setSelectedFase] = useState('Fase E (Kelas X)');
          const [selectedMapel, setSelectedMapel] = useState('Matematika');
          const [isGenerating, setIsGenerating] = useState(false);
          const [result, setResult] = useState(null);
          const [copied, setCopied] = useState(false);

          const availableMapel = Object.keys(kurikulumData[selectedFase] || {});

          const handleFaseChange = (e) => {
            const newFase = e.target.value;
            setSelectedFase(newFase);
            setSelectedMapel(Object.keys(kurikulumData[newFase])[0]);
            setResult(null);
          };

          const handleGenerate = () => {
            setIsGenerating(true);
            setResult(null);
            
            setTimeout(() => {
              const data = kurikulumData[selectedFase][selectedMapel];
              let globalAtpCounter = 1;
              const processedData = data.map((item) => {
                const atpList = item.tp.map(tpText => ({
                  kode: `10.${globalAtpCounter++}`,
                  teks: tpText
                }));
                
                return { ...item, atp: atpList };
              });

              setResult({
                fase: selectedFase,
                mapel: selectedMapel,
                data: processedData,
                tahun: '2025/2026'
              });
              setIsGenerating(false);
            }, 800);
          };

          const handleDownload = () => {
            if (!result) return;
            
            const header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Dokumen CP dan ATP</title></head><body>";
            const footer = "</body></html>";
            
            let docContent = `
              <div style="text-align: center; font-family: 'Times New Roman', serif;">
                <h2>CAPAIAN DAN ALUR TUJUAN PEMBELAJARAN</h2>
                <h3>Tingkat Sekolah Menengah Atas (SMA)</h3>
                <p>Mata Pelajaran: <strong>${result.mapel}</strong> | Fase: <strong>${result.fase}</strong></p>
              </div>
              <hr style="margin-bottom: 20px;"/>
            `;

            result.data.forEach(item => {
              docContent += `
                <div style="font-family: 'Times New Roman', serif; margin-bottom: 30px;">
                  <h4 style="background-color: #f1f5f9; padding: 10px; border: 1px solid #cbd5e1; margin-bottom: 10px;">Elemen: ${item.elemen}</h4>
                  <h5 style="margin-top: 15px; margin-bottom: 5px;">Capaian Pembelajaran (CP)</h5>
                  <p style="text-align: justify; margin-top: 0;">${item.cp}</p>
                  <h5 style="margin-top: 20px; margin-bottom: 10px;">Alur Tujuan Pembelajaran (ATP)</h5>
                  <div>
              `;
              
              item.atp.forEach((atpItem, idx) => {
                docContent += `
                  <div style="border: 1px solid #bfdbfe; background-color: #eff6ff; padding: 10px; margin-bottom: 5px; border-radius: 4px;">
                    <strong>${atpItem.kode}</strong> - ${atpItem.teks}
                  </div>
                `;
                if (idx < item.atp.length - 1) {
                   docContent += `<div style="text-align: center; font-size: 24px; color: #3b82f6; margin: 5px 0;">&#8595;</div>`; 
                }
              });

              docContent += `</div></div>`;
            });

            const html = header + docContent + footer;
            const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const filename = `CP_ATP_${result.mapel.replace(/\s+/g, '_')}_${result.fase.replace(/\s+/g, '_')}.doc`;
            
            const downloadLink = document.createElement("a");
            downloadLink.href = url;
            downloadLink.download = filename;
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
            URL.revokeObjectURL(url);
          };

          const handleCopy = () => {
            const textToCopy = `Dokumen CP, TP, dan ATP\nFase: ${result.fase}\nMata Pelajaran: ${result.mapel}\n\n` + 
              result.data.map(d => `Elemen: ${d.elemen}\nCP: ${d.cp}\nTP: ${d.tp.join('; ')}`).join('\n\n');
            
            navigator.clipboard.writeText(textToCopy);
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
          };

          return (
            <div>
              <header className="bg-blue-900 text-white shadow-md print:hidden">
                <div className="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
                  <div className="flex items-center gap-3">
                    <div className="bg-white/10 p-2 rounded-lg">
                      <GraduationCapIcon />
                    </div>
                    <div>
                      <h1 className="font-bold text-xl leading-tight">Generator Kurikulum Merdeka</h1>
                      <p className="text-xs text-blue-200">Menyusun CP, TP, & ATP jenjang SMA/MA</p>
                    </div>
                  </div>
                  <div className="text-sm bg-blue-800 px-3 py-1 rounded-full border border-blue-700 text-blue-100">
                    Sesuai Regulasi Terbaru
                  </div>
                </div>
              </header>

              <main className="max-w-6xl mx-auto px-4 py-8">
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8 print:hidden">
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
                    
                    <div className="space-y-2">
                      <label className="block text-sm font-semibold text-slate-700">Fase (Kelas)</label>
                      <div className="relative">
                        <select 
                          value={selectedFase}
                          onChange={handleFaseChange}
                          className="w-full appearance-none bg-slate-50 border border-slate-300 text-slate-700 py-2.5 px-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                        >
                          {Object.keys(kurikulumData).map(fase => (
                            <option key={fase} value={fase}>{fase}</option>
                          ))}
                        </select>
                        <span className="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none"><ChevronDownIcon /></span>
                      </div>
                    </div>

                    <div className="space-y-2">
                      <label className="block text-sm font-semibold text-slate-700">Mata Pelajaran SMA</label>
                      <div className="relative">
                        <select 
                          value={selectedMapel}
                          onChange={(e) => setSelectedMapel(e.target.value)}
                          className="w-full appearance-none bg-slate-50 border border-slate-300 text-slate-700 py-2.5 px-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                        >
                          {availableMapel.map(mapel => (
                            <option key={mapel} value={mapel}>{mapel}</option>
                          ))}
                        </select>
                        <span className="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none"><ChevronDownIcon /></span>
                      </div>
                    </div>

                    <div>
                      <button 
                        onClick={handleGenerate}
                        disabled={isGenerating}
                        className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors flex justify-center items-center gap-2 disabled:bg-blue-400"
                      >
                        {isGenerating ? (
                          <span className="flex items-center gap-2">
                            <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                            Memproses...
                          </span>
                        ) : (
                          <span className="flex items-center gap-2 m-auto">
                            <SettingsIcon /> Generate Dokumen
                          </span>
                        )}
                      </button>
                    </div>
                  </div>
                </div>

                {result && (
                  <div className="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
                    <div className="bg-slate-100 border-b border-slate-200 p-4 flex justify-between items-center print:hidden">
                      <div className="flex items-center gap-2 text-slate-600 font-medium">
                        <FileTextIcon />
                        <span>Pratinjau Dokumen</span>
                      </div>
                      <div className="flex gap-2">
                        <button onClick={handleCopy} className="flex items-center gap-2 bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 px-3 py-1.5 rounded-md text-sm font-medium transition-colors">
                          {copied ? <CheckCircleIcon /> : <CopyIcon />}
                          {copied ? 'Tersalin!' : 'Salin Teks'}
                        </button>
                        <button onClick={handleDownload} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-md text-sm font-medium transition-colors shadow-sm">
                          <DownloadIcon />
                          Unduh Dokumen (.doc)
                        </button>
                      </div>
                    </div>

                    <div className="p-8 sm:p-12 print:p-0 print:text-black">
                      <div className="text-center mb-8 border-b-2 border-black pb-6">
                        <h2 className="text-2xl font-bold uppercase tracking-wide mb-1">Capaian dan Alur Tujuan Pembelajaran</h2>
                        <h3 className="text-xl font-semibold">Tingkat Sekolah Menengah Atas (SMA)</h3>
                        <div className="mt-4 flex justify-center gap-6 text-sm font-medium">
                          <span className="bg-slate-100 print:bg-transparent px-3 py-1 rounded">Mata Pelajaran: <strong>{result.mapel}</strong></span>
                          <span className="bg-slate-100 print:bg-transparent px-3 py-1 rounded">Fase: <strong>{result.fase}</strong></span>
                        </div>
                      </div>

                      <div className="space-y-8">
                        {result.data.map((item, index) => (
                          <div key={index} className="break-inside-avoid border border-slate-300 print:border-black rounded-lg overflow-hidden">
                            <div className="bg-slate-100 print:bg-gray-200 border-b border-slate-300 print:border-black p-3">
                              <h4 className="font-bold flex items-center gap-2">
                                <span className="print:hidden"><BookOpenIcon /></span>
                                Elemen: {item.elemen}
                              </h4>
                            </div>
                            
                            <div className="p-4 space-y-4">
                              <div>
                                <h5 className="font-semibold text-slate-700 print:text-black mb-1 underline decoration-2 underline-offset-4">Capaian Pembelajaran (CP)</h5>
                                <p className="text-justify leading-relaxed">{item.cp}</p>
                              </div>

                              <div className="mt-4 pt-4 border-t border-slate-200 print:border-black border-dashed">
                                <h5 className="font-semibold text-slate-700 print:text-black mb-4">Bagan Alur Tujuan Pembelajaran (ATP)</h5>
                                <div className="flex flex-col gap-1">
                                  {item.atp.map((atpItem, atpIdx) => (
                                    <React.Fragment key={atpIdx}>
                                      <div className="border border-blue-200 bg-blue-50/50 p-4 rounded-lg shadow-sm print:shadow-none print:border-black print:bg-transparent flex items-start gap-4">
                                        <span className="bg-blue-600 text-white font-bold px-3 py-1.5 rounded-md text-sm print:bg-gray-200 print:text-black print:border print:border-black shrink-0">
                                          {atpItem.kode}
                                        </span>
                                        <p className="text-slate-700 print:text-black leading-relaxed mt-0.5">
                                          {atpItem.teks}
                                        </p>
                                      </div>
                                      {atpIdx < item.atp.length - 1 && (
                                        <div className="flex justify-center my-1 print:my-2">
                                          <ArrowDownIcon />
                                        </div>
                                      )}
                                    </React.Fragment>
                                  ))}
                                </div>
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>

                      <div className="mt-16 justify-end print:flex hidden">
                        <div className="text-center w-64">
                          <p>Mengetahui,</p>
                          <p className="mb-20">Kepala Sekolah / Guru Mata Pelajaran</p>
                          <p className="font-bold underline">___________________________</p>
                          <p>NIP. </p>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </main>
            </div>
          );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
